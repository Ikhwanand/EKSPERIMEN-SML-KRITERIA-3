name: ML Model CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.3'
          cache: 'pip'

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: mlflow-env
          environment-file: MLProject/conda.yaml
          auto-activate-base: false

      - name: Install dependencies
        run: |
          if [ ! -f requirements.txt ] && [ ! -f pyproject.toml ]; then
            echo "No requirements.txt or pyproject.toml found"
            exit 1
          fi
          pip install -r requirements.txt || pip install -e .

      - name: Train model and log to MLflow
        shell: bash -l {0}
        run: |
          cd MLProject
          export MLFLOW_TRACKING_URI="file:./mlruns"
          python modelling.py
          # Store run ID immediately after training
          RUN_ID=$(mlflow runs list --experiment-id 0 --view ALL -m 1 | tail -n 1 | cut -f 1)
          echo "Found Run ID: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns
            MLProject/MLmodel
            MLProject/conda.yaml
            MLProject/images/*.png

        # Get latest run_id
      - name: Get latest MLflow run_id
        shell: bash -l {0}
        run: |
          cd MLProject
          RUN_ID=$(ls -t mlruns/0/*/meta.yaml | head -n 1 | cut -d'/' -f3)
          echo "Found Run ID: $RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Build Docker Model
        shell: bash -l {0}
        run: |
          cd MLProject
          pip install mlflow
          echo "Building Docker image for run ID: ${{ env.RUN_ID }}"
          # List MLflow runs for debugging
          echo "Available MLflow runs:"
          mlflow runs list --experiment-id 0
          
          # Build Docker image
          mlflow models build-docker \
            --model-uri "runs:/${{ env.RUN_ID }}/model" \
            --name "churn_prediction" \
            --env-manager conda

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and Push Docker Image
        run: |
          docker tag churn_prediction:latest ${{ secrets.DOCKER_HUB_USERNAME }}/churn_prediction:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/churn_prediction:latest
