name: ML Model CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'MLProject/**'
  workflow_dispatch:

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.3'
          cache: 'pip'

      - name: Setup Conda
        uses: conda-incubator/setup-miniconda@v2
        with:
          activate-environment: mlflow-env
          environment-file: MLProject/conda.yaml
          auto-activate-base: false


      
      - name: Check out code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          if [ ! -f requirements.txt ] && [ ! -f pyproject.toml ]; then
            echo "No requirements.txt or pyproject.toml found"
            exit 1
          fi
          pip install -r requirements.txt || pip install -e .


      - name: Train model and log to MLflow
        shell: bash -l {0}
        run: |
          cd MLProject
          export MLFLOW_TRACKING_URI="file:./mlruns"
          python modelling.py


      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: |
            MLProject/mlruns
            MLProject/MLmodel
            MLProject/conda.yaml
            MLProject/images/*.png



      - name: Debug - Inspect directory structure
        run: |
          echo "Current directory:"
          pwd
          echo "Contents of current directory:"
          ls -R
          echo "Contents of MLProject directory:"
          ls -R MLProject

      - name: Debug - Find MLflow runs
        run: |
          echo "Searching for mlruns directory:"
          find . -name mlruns -type d
          echo "Contents of found mlruns directories:"
          find . -name mlruns -type d -exec ls -R {} \;


      - name: Get latest MLflow run_id
        run: |
          MLRUNS_DIR=$(find . -name mlruns -type d | head -n 1)
          if [ -z "$MLRUNS_DIR" ]; then
            echo "No mlruns directory found"
            exit 1
          fi
          echo "Using mlruns directory: $MLRUNS_DIR"
          RUN_ID=$(ls -td $MLRUNS_DIR/0/*/ 2>/dev/null | head -n 1 | cut -d'/' -f5)
          if [ -z "$RUN_ID" ]; then
            echo "No run ID found"
            exit 1
          fi
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"
          

      - name: Build Docker Model
        run: |
          if [ -z "$RUN_ID" ]; then
            echo "No RUN_ID set, cannot build Docker model"
            exit 1
          fi
          echo "Using Run ID: ${{ env.RUN_ID }}"
          mlflow models build-docker --model-uri "runs:/${{ env.RUN_ID }}/model" --name "churn_prediction"

      

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      
      - name: Tag Docker Image
        run: |
          docker tag churn_prediction ${{ secrets.DOCKER_HUB_USERNAME }}/churn_prediction:latest

      
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/churn_prediction:latest
